<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NStudio</title>

<meta name="description" content="NStudio - Comprendre le système. Développer l'humain.">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    font-family:Arial, Helvetica, sans-serif;

    background:
    linear-gradient(
        rgba(0,0,0,.55),
        rgba(0,0,0,.82)
    ),
    url("ArrierePlan-NStudio.png");

    background-size:65%;
    background-position:center center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{

    content:"";

    position:fixed;
    inset:0;

    background:

    radial-gradient(
        circle at center,
        rgba(31,156,255,.08),
        transparent 45%
    ),

    radial-gradient(
        circle at center,
        rgba(199,154,74,.08),
        transparent 65%
    );

    pointer-events:none;
}

.portal{

    position:relative;

    text-align:center;

    max-width:900px;

    padding:60px;

    border-radius:40px;

    background:
    linear-gradient(
        rgba(0,0,0,.35),
        rgba(0,0,0,.55)
    );

    backdrop-filter:blur(12px);

    border:
    1px solid rgba(240,210,138,.12);

    box-shadow:
    0 30px 120px rgba(0,0,0,.45);

    z-index:2;
}

.logo-link{

    display:inline-block;

    transition:.5s ease;
}

.logo{

    width:280px;

    max-width:80vw;

    border-radius:50%;

    transition:.5s ease;

    box-shadow:
    0 0 50px rgba(31,156,255,.12),
    0 0 120px rgba(199,154,74,.15);
}

.logo:hover{

    transform:
    scale(1.05)
    rotate(1deg);

    box-shadow:
    0 0 80px rgba(31,156,255,.25),
    0 0 180px rgba(199,154,74,.25);
}

h1{

    margin-top:35px;

    color:white;

    font-size:clamp(42px,8vw,90px);

    letter-spacing:-2px;
}

.tagline{

    margin-top:15px;

    color:#e6d7bc;

    font-size:clamp(18px,2vw,28px);

    line-height:1.6;
}

.separator{

    width:120px;
    height:1px;

    margin:35px auto;

    background:
    linear-gradient(
        to right,
        transparent,
        rgba(240,210,138,.8),
        transparent
    );
}

.enter-btn{

    display:inline-flex;

    align-items:center;
    justify-content:center;

    padding:16px 40px;

    border-radius:999px;

    text-decoration:none;

    font-weight:700;

    letter-spacing:2px;

    color:#050505;

    background:
    linear-gradient(
        135deg,
        #fff8de,
        #e6c477,
        #b57a27
    );

    transition:.35s ease;

    box-shadow:
    0 0 30px rgba(199,154,74,.25);
}

.enter-btn:hover{

    transform:translateY(-4px);

    box-shadow:
    0 0 50px rgba(199,154,74,.40);
}

.premium-btn{

    display:flex;

    align-items:center;
    justify-content:center;

    margin-top:20px;

    padding:18px 42px;

    border-radius:999px;

    text-decoration:none;

    font-weight:700;

    letter-spacing:2px;

    color:#f4f0e8;

    border:1px solid rgba(240,210,138,.25);

    background:
    linear-gradient(
        135deg,
        rgba(10,18,28,.98),
        rgba(18,32,48,.98)
    );

    box-shadow:
    0 0 30px rgba(31,156,255,.18),
    0 0 60px rgba(199,154,74,.08);

    transition:.35s ease;
}

.premium-btn:hover{

    transform:
    translateY(-4px)
    scale(1.03);

    border-color:
    rgba(240,210,138,.65);

    box-shadow:
    0 0 50px rgba(31,156,255,.35),
    0 0 100px rgba(199,154,74,.20);
}

.signature{

    margin-top:40px;

    color:rgba(255,255,255,.55);

    font-size:14px;

    letter-spacing:2px;
}

@media(max-width:768px){

    body{
        background-size:140%;
    }

    .portal{
        width:92%;
        padding:40px 25px;
    }

    .logo{
        width:220px;
    }

    .enter-btn,
    .premium-btn{
        width:100%;
    }
}

</style>

</head>

<body>

<div class="portal">

    <a href="plateforme.html" class="logo-link">

        <img
        src="Logo-NStudio.jpg"
        alt="Logo NStudio"
        class="logo">

    </a>

    <h1>NStudio</h1>

    <p class="tagline">
        Comprendre le système.<br>
        Développer l'humain.
    </p>

    <div class="separator"></div>

    <a href="plateforme.html" class="enter-btn">
        ACCÉDER AU BUREAU
    </a>

    <a
    href="https://chatgpt.com/g/g-681b86f1f87c8191b695e33446183ea3-a-e-n-a-anima-echo-de-la-nouvelle-aube"
    target="_blank"
    rel="noopener noreferrer"
    class="premium-btn">

        ◈ OUVRIR LE PORTAIL PREMIUM

    </a>

    <div class="signature">
        Bureau Numérique • Structuration • Transmission
    </div>

</div>

</body>
</html>
